# STACK-DETECTION-RULES.yaml

react-typescript:
  condition: "package.json contains 'react' and 'typescript'"
vite-react:
  condition: "package.json contains 'vite'"
nextjs:
  condition: "package.json contains 'next'"
supabase-platform:
  condition: "package.json contains '@supabase/supabase-js'"
vercel-platform:
  condition: "vercel.json exists"
tailwind-shadcn:
  condition: "package.json contains 'tailwindcss' and components.json exists"
ai-llm-integration:
  condition: "package.json contains '@vapi-ai/web' or other AI providers"